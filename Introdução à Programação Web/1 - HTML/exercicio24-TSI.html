<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Questão 24</title>
  <style>
    #cabecalho {
      background-color: lightgray;
      height: 40px;
      text-align: center;
      border-radius: 10px;
      margin: 6px;

    }

    .container {
      text-align: center;
      display: flex;
      border-radius: 10px;


    }

    #aside {
      width: 33.33%;
      height: 500px;
      background-color: chocolate;
      border-radius: 10px;
      margin: 6px;
    }

    #conteudo {
      background-color: lightcoral;
      width: 33.33%;
      height: 500px;
      border-radius: 10px;
      margin: 6px;
    }

    .harticle {
      background-color: lightgreen;
      height: 10%;
      border-radius: 10px;
      margin: 6px;
    }

    #article {
      background-color: lightgreen;
      height: 55%;
      border-radius: 10px;
      margin: 6px;
    }

    .farticle {
      background-color: lightgreen;
      height: 10%;
      border-radius: 10px;
      margin: 6px;
    }



    #nav {
      background-color: aqua;
      width: 33.33%;
      height: 500px;
      border-radius: 10px;
      margin: 6px;
    }

    #rodape {
      background-color: lightseagreen;
      text-align: center;
      height: 40px;
      border-radius: 10px;
      margin: 6px;
    }
  </style>
</head>

<body>
  <header id="cabecalho">
    <p>&lt;header&gt;<br>
      <span> Cabeçalho da Página</span>
    </p>
  </header>
  <div class="container">
    <aside id="aside">
      <p>
        &lt;Aside&gt;<br>
        <span>Conteúdo Relacionado</span>
      </p>
    </aside>
    <section id="conteudo">
      <p>
        &lt;section&gt;<br>
        <span>Conteúdo</span>
      </p>
      <header class="harticle">
        <p> &lt;header&gt;<br>
          <span> Cabeçalho do &lt;article&gt;</span>
        </p>
      </header>
      <article id="article">
        <p> &lt;article&gt;</p>
      </article>
      <footer class="farticle">
        <p> &lt;footer&gt;<br>
          <span> Rodapé do &lt;article&gt;</span>
        </p>
      </footer>
    </section>
    <nav id="nav">
      <p> &lt;nav&gt;<br>
        <span>Navegação</span>
      </p>
    </nav>
  </div>
  <footer id="rodape">
    <p> &lt;footer&gt;<br>
      <span>Rodapé da página</span>
    </p>
  </footer>
</body>

</html>
