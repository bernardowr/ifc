<!DOCTYPE html>
<html lang=”pt-BR”>

<head>
  <meta charset=”UTF-8”>
  <title>Questão 21</title>
  <style>
    label {
      display: block;
    }
  </style>
</head>

<body>
  <h1>FORMULÁRIO</h1>

  <form>
    <label>Nome: <input name=”nome” required></label>
    <label>Email: <input name=”email” type=”email” required></label>
    <label>Mensagem: <textarea name=”mensagem” placeholder="Escreva sua Mensagem em até 40 caracteres." required
        maxlength="40"></textarea></label>
    <input type="submit" name="salvarRascunho" value="Salvar Rascunho">
    <input type="submit" name="enviar" value="Enviar">
  </form>
</body>

</html>
