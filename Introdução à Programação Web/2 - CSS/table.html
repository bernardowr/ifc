<!DOCTYPE html>
<html lang=”pt-br”>

<head>
  <meta charset="utf-8">
  <style>
    table,
    td,
    th {
      border: 1px solid black;
      border-collapse: collapse;
    }

    td {
      width: 50px;
      text-align: center;
    }
  </style>
  <title> Tabela Simulado</title>
</head>
<table>
  <tr>
    <td rowspan="2"> 1</td>
    <td>2</td>
    <td>3</td>
    <td colspan="2">4</td>
  </tr>

  <tr>
    <td>5</td>
    <td colspan="2"> 6</td>
    <td>7</td>
  </tr>
  <tr>
    <td>8
    <td>9
    <td>10
    <td>11
    <td>12
  </tr>
</table>

</html>
